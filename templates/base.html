<!-- base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FutureHub | Next-Gen Footwear{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        :root { --bg-color: #ffffff; --text-color: #1f1f1f; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .bg-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg width='1000' height='1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 500 Q 250 400 500 500 T 1000 500' stroke='%23eeeeee' fill='transparent'/%3E%3C/svg%3E"); background-size: cover; opacity: 0.5; z-index: -1; pointer-events: none; }

        .custom-cursor { width: 10px; height: 10px; background: #000; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; mix-blend-mode: difference; display: none; }
        @media (pointer: fine) { .custom-cursor { display: block; } }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="bg-lines"></div>
    <div class="custom-cursor" id="cursor"></div>

    <nav class="fixed top-0 w-full bg-black text-white px-6 md:px-12 py-4 md:py-6 flex justify-between items-center z-[100]">
        <div class="flex items-center gap-8">
            <div class="text-2xl md:text-4xl font-extrabold tracking-tighter">FutureHub_</div>
        </div>
        <div class="hidden md:flex space-x-16 text-sm font-extrabold uppercase tracking-[0.2em]">
            <a href="{% url 'collections' %}" class="hover:opacity-50 transition-opacity">Collections</a>
            <a href="#" class="hover:opacity-100 transition-opacity">Innovation</a>
            <a href="#" class="hover:opacity-100 transition-opacity">Studio</a>
        </div>
        <button class="bg-white text-black px-6 md:px-14 py-3 rounded-full text-xs md:text-sm font-black uppercase tracking-widest hover:scale-105 transition-transform">
            Shop
        </button>
    </nav>

    {% block content %}{% endblock %}

    <script>
        const cursor = document.getElementById('cursor');
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.15 });
            });
        }
        gsap.registerPlugin(ScrollTrigger);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
